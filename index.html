<title>筋トレ記録</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 16px;
    -webkit-text-size-adjust: 100%;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height: 100vh;
  }
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 16px 80px;
  }
  header {
    padding: 8px 4px 16px;
  }
  h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .subtitle {
    color: #94a3b8;
    font-size: 13px;
    margin-top: 4px;
  }
  /* タブ */
  .tabs {
    display: flex;
    background: #1e293b;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 15px;
    color: #94a3b8;
    border-radius: 9px;
    cursor: pointer;
    font-weight: 600;
    user-select: none;
  }
  .tab.active {
    background: #334155;
    color: #f1f5f9;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: #1e293b;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    border: 1px solid #334155;
  }
  label {
    display: block;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 8px;
    font-weight: 600;
  }
  input[type="date"],
  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 13px 12px;
    background: #0f172a;
    color: #f1f5f9;
    border: 1px solid #475569;
    border-radius: 10px;
    font-size: 17px;
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    font-family: inherit;
    min-height: 48px;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #38bdf8;
  }
  textarea {
    min-height: 64px;
    resize: vertical;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  /* 新規種目追加 */
  .add-exercise-btn {
    margin-top: 10px;
    font-size: 14px;
    padding: 11px;
  }
  .add-exercise-form {
    display: none;
    margin-top: 12px;
    padding: 14px;
    background: #0f172a;
    border: 1px dashed #475569;
    border-radius: 10px;
  }
  .add-exercise-form.show { display: block; }
  .autodetect-hint {
    margin-top: 6px;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.5;
  }
  .autodetect-hint.detected { color: #7dd3fc; }
  .autodetect-hint.unknown { color: #fbbf24; }

  /* 前回情報バナー */
  .prev-info {
    background: linear-gradient(180deg, #0c4a6e 0%, #075985 100%);
    border: 1px solid #0ea5e9;
    color: #e0f2fe;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .prev-info.show { display: block; }
  .prev-info .label {
    color: #7dd3fc;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .prev-info .empty {
    color: #94a3b8;
    font-style: italic;
  }

  .set-list {
    margin-top: 10px;
  }
  .set-item {
    padding: 12px 0;
    border-bottom: 1px dashed #334155;
  }
  .set-item:last-child { border-bottom: none; padding-bottom: 4px; }
  .set-item-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .set-no {
    background: #334155;
    color: #f1f5f9;
    border-radius: 8px;
    font-size: 14px;
    padding: 6px 14px;
    font-weight: 700;
  }
  .set-item-inputs {
    display: grid;
    grid-template-columns: minmax(0, 1.65fr) minmax(0, 1fr);
    gap: 10px;
    align-items: center;
  }
  /* 回数入力ラッパ */
  .reps-wrap, .weight-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0f172a;
    border: 1px solid #475569;
    border-radius: 10px;
    padding: 0 10px;
    height: 46px;
  }
  .reps-wrap:focus-within, .weight-wrap:focus-within { border-color: #38bdf8; }
  .reps-wrap input, .weight-wrap input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    color: #f1f5f9;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    padding: 0;
    -webkit-appearance: none;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .reps-wrap input:focus, .weight-wrap input:focus { outline: none; }
  .reps-wrap input::-webkit-outer-spin-button,
  .reps-wrap input::-webkit-inner-spin-button,
  .weight-wrap input::-webkit-outer-spin-button,
  .weight-wrap input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .unit-label {
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .icon-btn {
    background: transparent;
    border: 1px solid #475569;
    color: #f87171;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    font-weight: 700;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 14px;
    background: #38bdf8;
    color: #0f172a;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.85; }
  .btn.secondary {
    background: #334155;
    color: #f1f5f9;
  }
  .btn.ghost {
    background: transparent;
    color: #94a3b8;
    border: 1px solid #475569;
  }
  .btn.danger {
    background: #ef4444;
    color: #fff;
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* 履歴 */
  .filter-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .filter-bar-3 {
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .filter-bar-3 > div:nth-child(3) {
    grid-column: 1 / -1;
  }
  .part-badge {
    display: inline-block;
    background: #475569;
    color: #f1f5f9;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    margin-right: 6px;
    font-weight: 700;
  }
  .part-badge[data-part="胸"] { background: #ef4444; }
  .part-badge[data-part="背中"] { background: #f59e0b; color: #1f2937; }
  .part-badge[data-part="肩"] { background: #8b5cf6; }
  .part-badge[data-part="腕"] { background: #ec4899; }
  .part-badge[data-part="脚"] { background: #10b981; }
  .part-badge[data-part="体幹"] { background: #14b8a6; }

  /* 成長タブ */
  .metric-hint {
    margin-top: 10px;
    padding: 12px;
    background: #0f172a;
    border-left: 3px solid #38bdf8;
    border-radius: 6px;
    font-size: 13px;
    color: #cbd5e1;
    line-height: 1.7;
  }
  .chart-empty {
    text-align: center;
    color: #64748b;
    padding: 40px 0;
    font-size: 14px;
  }
  .chart-title {
    font-weight: 700;
    font-size: 15px;
    color: #f1f5f9;
    margin-bottom: 10px;
    text-align: center;
  }
  .chart-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

<script>
  const STORAGE_KEY = 'workout_records_v1';
  const CUSTOM_GYMS_KEY = 'workout_custom_gyms_v1';
  const CUSTOM_EXERCISES_KEY = 'workout_custom_exercises_v1';

  // デフォルトのジム選択肢
  const DEFAULT_GYMS = ['読谷店', '石川店', '諸見里店', '北谷店', '愛知店'];

  // メニュー候補(部位別)- ベース定義
  const EXERCISE_GROUPS_BASE = [
    { name: '胸',   items: ['ベンチプレス', 'インクラインベンチプレス', 'ペックフライ', 'ディップス'] },
    { name: '背中', items: ['チンニング', 'プルダウン', 'ローイング', 'バーベルシュラッグ', 'ダンベルデッドリフト'] },
    { name: '肩',   items: ['ショルダープレス', 'サイドレイズ', 'フェイスプル'] },
    { name: '腕',   items: ['アームカール'] },
    { name: '脚',   items: ['レッグプレス'] },
    { name: '体幹', items: ['腹筋', 'トルソー'] }
  ];
  // 実行時に拡張される(ベース + カスタム種目)
  const EXERCISE_GROUPS = EXERCISE_GROUPS_BASE.map(g => ({ name: g.name, items: [...g.items] }));
  let EXERCISES = [];
  const EXERCISE_TO_GROUP = {};

  const loadCustomExercises = () => {
    try { return JSON.parse(localStorage.getItem(CUSTOM_EXERCISES_KEY) || '[]'); }
    catch { return []; }
  };
  const saveCustomExercises = (list) => {
    localStorage.setItem(CUSTOM_EXERCISES_KEY, JSON.stringify(list));
  };

  // カスタム種目をEXERCISE_GROUPSに反映
  const applyCustomExercises = () => {
    // ベースに戻す
    EXERCISE_GROUPS.length = 0;
    EXERCISE_GROUPS_BASE.forEach(g => EXERCISE_GROUPS.push({ name: g.name, items: [...g.items] }));
    // カスタムを追加
    const custom = loadCustomExercises();
    custom.forEach(c => {
      const group = EXERCISE_GROUPS.find(g => g.name === c.part);
      if (group && !group.items.includes(c.name)) group.items.push(c.name);
    });
    // 派生データを更新
    EXERCISES = EXERCISE_GROUPS.flatMap(g => g.items);
    for (const k in EXERCISE_TO_GROUP) delete EXERCISE_TO_GROUP[k];
    EXERCISE_GROUPS.forEach(g => g.items.forEach(it => { EXERCISE_TO_GROUP[it] = g.name; }));
  };
  applyCustomExercises();

  // 種目名から部位を自動判定
  const detectPart = (name) => {
    if (!name) return null;
    // 優先度順(より具体的・より特徴的な語を先に判定)
    if (/腹|クランチ|プランク|トルソー|アブローラー|アブ|ロシアン|シットアップ|ツイスト|レッグレイズ|ヒップレイズ/.test(name)) return '体幹';
    if (/レッグカール|レッグエクステンション|レッグプレス|スクワット|ランジ|カーフ|ヒップスラスト|ヒップアダクション|ヒップアブダクション|アダクション|アブダクション|ハムストリング|レッグ/.test(name)) return '脚';
    if (/ショルダープレス|サイドレイズ|フロントレイズ|リアレイズ|フェイスプル|アップライト|リアデルト|ショルダー/.test(name)) return '肩';
    if (/デッドリフト|プルダウン|ローイング|懸垂|チンニング|シュラッグ|ラットプル|ベントオーバー|プルアップ/.test(name)) return '背中';
    if (/ベンチプレス|ベンチ|フライ|ディップス|プッシュアップ|チェスト|ペック|腕立て/.test(name)) return '胸';
    if (/トライセプス|エクステンション|プッシュダウン|キックバック|リストカール|ハンマーカール|プリーチャー|カール/.test(name)) return '腕';
    if (/プレス/.test(name)) return '胸';
    return null;
  };

  // 5kg刻みゲージを使う大筋群種目
  const BIG_MUSCLE_EXERCISES = new Set([
    'ベンチプレス',
    'インクラインベンチプレス',
    'プルダウン',
    'バーベルシュラッグ',
    'ローイング',
    'ショルダープレス',
    'レッグプレス',
    'ダンベルデッドリフト'
  ]);
  const isBigMuscle = (ex) => BIG_MUSCLE_EXERCISES.has(ex);

  // ---------- ユーティリティ ----------
  const $ = (id) => document.getElementById(id);
  const todayISO = () => {
    const d = new Date();
    const tz = d.getTimezoneOffset() * 60000;
    return new Date(d - tz).toISOString().slice(0, 10);
  };
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

  const loadRecords = () => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  };
  const saveRecords = (records) => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  };

  // 既存レコードに order が無いものを補完(日付内で createdAt 順に採番)
  const ensureRecordOrder = () => {
    const records = loadRecords();
    let modified = false;
    const byDate = {};
    records.forEach(r => {
      if (!byDate[r.date]) byDate[r.date] = [];
      byDate[r.date].push(r);
    });
    Object.values(byDate).forEach(group => {
      group.sort((a, b) => {
        // 既存orderを優先、無ければcreatedAt
        const ao = a.order, bo = b.order;
        if (ao != null && bo != null) return ao - bo;
        if (ao != null) return -1;
        if (bo != null) return 1;
        return String(a.createdAt || '').localeCompare(String(b.createdAt || ''));
      });
      group.forEach((r, i) => {
        if (r.order !== i) { r.order = i; modified = true; }
      });
    });
    if (modified) saveRecords(records);
  };

  // 指定IDのレコードを同日内で上(-1)または下(+1)に移動
  const moveRecord = (id, direction) => {
    const records = loadRecords();
    const target = records.find(r => r.id === id);
    if (!target) return;
    const sameDay = records
      .filter(r => r.date === target.date)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const idx = sameDay.findIndex(r => r.id === id);
    const swapIdx = idx + direction;
    if (swapIdx < 0 || swapIdx >= sameDay.length) return;
    const tmp = sameDay[idx].order;
    sameDay[idx].order = sameDay[swapIdx].order;
    sameDay[swapIdx].order = tmp;
    saveRecords(records);
    renderTodaySummary();
  };
  const loadCustomGyms = () => {
    try { return JSON.parse(localStorage.getItem(CUSTOM_GYMS_KEY) || '[]'); }
    catch { return []; }
  };
  const saveCustomGyms = (gyms) => {
    localStorage.setItem(CUSTOM_GYMS_KEY, JSON.stringify(gyms));
  };

  // 修正モード状態: 編集中の record.id を保持(新規登録時は null)
  let editingRecordId = null;

  const updateEditModeUI = () => {
    const editing = editingRecordId !== null;
    const saveBtn = $('saveBtn');
    const cancelBtn = $('cancelEditBtn');
    const banner = $('editModeBanner');
    if (editing) {
      saveBtn.textContent = '修正を保存';
      saveBtn.classList.add('save-btn-edit');
      cancelBtn.style.display = 'flex';
      banner.classList.add('show');
    } else {
      saveBtn.textContent = 'この記録を保存';
      saveBtn.classList.remove('save-btn-edit');
      cancelBtn.style.display = 'none';
      banner.classList.remove('show');
    }
  };

  // 現在選択中のジム名を解決(「その他」選択時はotherGym入力値)
  const getCurrentGym = () => {
    const v = $('gym').value;
    if (v === '__other__') return $('otherGym').value.trim();
    return v;
  };

  const showToast = (msg, type = 'ok') => {
    const t = $('toast');
    t.textContent = msg;
    t.style.background = (type === 'ok') ? '#22c55e' : '#ef4444';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  };

  // ---------- タブ切替 ----------
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      $('panel-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'history') renderHistory();
      if (tab.dataset.tab === 'growth') renderGrowth();
    });
  });

  // ---------- ジム選択肢の構築 ----------
  const buildGymOptions = () => {
    const customGyms = loadCustomGyms();
    const all = [...DEFAULT_GYMS, ...customGyms];
    const select = $('gym');
    const prev = select.value;
    select.innerHTML = all.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('')
      + '<option value="__other__">その他(新しい店舗を追加)</option>';
    if (prev && [...select.options].some(o => o.value === prev)) {
      select.value = prev;
    }
  };

  $('gym').addEventListener('change', () => {
    $('otherGymWrap').classList.toggle('show', $('gym').value === '__other__');
    // 既に種目選択済みなら、前回情報を新しい店舗ベースで更新
    const ex = $('exercise').value;
    if (ex) showPrevInfo(ex);
  });
  // 「その他」店舗名入力時にも前回情報を更新(入力が確定したタイミングで)
  $('otherGym').addEventListener('change', () => {
    const ex = $('exercise').value;
    if (ex) showPrevInfo(ex);
  });

  // ---------- 種目選択肢の構築 ----------
  const buildExerciseOptions = () => {
    const select = $('exercise');
    let html = '<option value="">-- 選択してください --</option>';
    EXERCISE_GROUPS.forEach(group => {
      html += `<optgroup label="${escapeHtml(group.name)}">`;
      group.items.forEach(item => {
        html += `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`;
      });
      html += '</optgroup>';
    });
    select.innerHTML = html;
  };

  // ---------- 新規種目追加 ----------
  $('openAddExerciseBtn').addEventListener('click', () => {
    $('addExerciseForm').classList.add('show');
    $('newExerciseName').value = '';
    $('newExercisePart').value = '';
    $('autoDetectHint').textContent = '';
    $('autoDetectHint').className = 'autodetect-hint';
    setTimeout(() => $('newExerciseName').focus(), 50);
  });
  $('cancelNewExerciseBtn').addEventListener('click', () => {
    $('addExerciseForm').classList.remove('show');
  });
  $('newExerciseName').addEventListener('input', () => {
    const name = $('newExerciseName').value.trim();
    const hint = $('autoDetectHint');
    if (!name) {
      hint.textContent = '';
      hint.className = 'autodetect-hint';
      return;
    }
    const detected = detectPart(name);
    if (detected) {
      // 自動判定 → 部位プルダウンも自動セット(ユーザは下で修正可能)
      $('newExercisePart').value = detected;
      hint.innerHTML = `自動判定: <strong>「${escapeHtml(detected)}」</strong> に分類されます。違っていれば下のプルダウンで変更してください。`;
      hint.className = 'autodetect-hint detected';
    } else {
      hint.textContent = '部位を自動判定できませんでした。下のプルダウンから手動で選択してください。';
      hint.className = 'autodetect-hint unknown';
    }
  });
  $('saveNewExerciseBtn').addEventListener('click', () => {
    const name = $('newExerciseName').value.trim();
    const part = $('newExercisePart').value;
    if (!name) { showToast('種目名を入力してください', 'ng'); return; }
    if (!part) { showToast('部位を選択してください', 'ng'); return; }
    if (EXERCISES.includes(name)) {
      showToast(`「${name}」は既に登録されています(${EXERCISE_TO_GROUP[name]})`, 'ng');
      return;
    }
    // 保存
    const custom = loadCustomExercises();
    custom.push({ name, part });
    saveCustomExercises(custom);
    applyCustomExercises();
    buildExerciseOptions();
    // 追加した種目を即選択して入力可能に
    $('exercise').value = name;
    $('exercise').dispatchEvent(new Event('change'));
    // フォームを閉じる
    $('addExerciseForm').classList.remove('show');
    showToast(`「${name}」を「${part}」に追加しました`);
  });

  // ---------- 前回情報を表示 ----------
  const showPrevInfo = (exercise) => {
    const box = $('prevInfo');
    const body = $('prevInfoBody');
    if (!exercise) { box.classList.remove('show'); return; }

    const part = EXERCISE_TO_GROUP[exercise] || '';
    const partBadge = part ? `<span class="part-badge" data-part="${escapeHtml(part)}">${escapeHtml(part)}</span>` : '';

    const currentGym = getCurrentGym();
    const all = loadRecords()
      .filter(r => r.exercise === exercise)
      .sort((a, b) => (a.date < b.date ? 1 : -1));
    const sameGym = currentGym ? all.filter(r => r.gym === currentGym) : [];
    const otherGym = currentGym ? all.filter(r => r.gym !== currentGym) : all;

    if (all.length === 0) {
      body.innerHTML = `<div>${partBadge}<span style="color:#94a3b8;">この種目の過去記録はまだありません</span></div>`;
      box.classList.add('show');
      return;
    }

    let html = '';
    if (sameGym.length > 0) {
      const r = sameGym[0];
      const valid = r.sets.filter(s => s.weight != null);
      const weights = valid.map(s => `${s.weight}kg${s.reps != null ? '×' + s.reps + '回' : ''}`).join(' / ');
      const maxW = valid.length ? Math.max(...valid.map(s => s.weight)) : null;
      html += `
        <div style="font-weight:700;font-size:15px;">${partBadge}${formatDate(r.date)} @ ${escapeHtml(r.gym)}</div>
        <div style="margin-top:4px;">${weights || '(重量記録なし)'}</div>
        ${maxW !== null ? `<div style="margin-top:4px;font-size:12px;color:#7dd3fc;">最大重量: ${maxW}kg</div>` : ''}
      `;
    } else {
      html += `<div style="font-weight:700;">${partBadge}<span style="color:#fbbf24;">${escapeHtml(currentGym || '現在の店舗')}での記録はまだありません</span></div>`;
    }

    // 他店舗の最新を参考表示
    if (otherGym.length > 0 && sameGym.length === 0) {
      // 同店舗実績がない場合は、他店舗を全件参考に表示(最大3件)
      const refs = otherGym.slice(0, 3);
      html += `<div style="margin-top:8px;padding-top:6px;border-top:1px dashed rgba(255,255,255,0.25);font-size:12px;color:#cbd5e1;">他店舗での参考:</div>`;
      refs.forEach(r => {
        const valid = r.sets.filter(s => s.weight != null);
        const ws = valid.map(s => `${s.weight}kg`).join(' / ');
        html += `<div style="font-size:12px;color:#cbd5e1;margin-top:2px;">・${formatDate(r.date)} @ ${escapeHtml(r.gym)} ${ws ? '(' + ws + ')' : ''}</div>`;
      });
    } else if (otherGym.length > 0) {
      const r = otherGym[0];
      const valid = r.sets.filter(s => s.weight != null);
      const ws = valid.map(s => `${s.weight}kg`).join('/');
      html += `<div style="margin-top:6px;padding-top:6px;border-top:1px dashed rgba(255,255,255,0.25);font-size:11px;color:#94a3b8;">他店舗最新: ${formatDate(r.date)} @ ${escapeHtml(r.gym)}${ws ? ' (' + ws + ')' : ''}</div>`;
    }

    body.innerHTML = html;
    box.classList.add('show');
  };

  $('exercise').addEventListener('change', () => {
    const ex = $('exercise').value;
    showPrevInfo(ex);
    // 入力タイプが変わる可能性があるためセット行を作り直す
    setList.innerHTML = '';

    // 同じ店舗での前回記録のみをプリセットに使う(機材差を考慮)
    const currentGym = getCurrentGym();
    const prevRecord = (ex && currentGym) ? loadRecords()
      .filter(r => r.exercise === ex && r.gym === currentGym)
      .sort((a, b) => (a.date < b.date ? 1 : -1))[0] : null;

    if (prevRecord && prevRecord.sets.length > 0) {
      prevRecord.sets.forEach((s, i) => {
        const w = (s.weight != null) ? s.weight : '';
        setList.appendChild(buildSetRow(i + 1, w, '', ex));
      });
    } else {
      // この店舗での過去記録なし → 空のセットを3つ用意
      for (let i = 0; i < 3; i++) {
        setList.appendChild(buildSetRow(i + 1, '', '', ex));
      }
    }
  });

  // ---------- 本日の記録サマリーを表示 ----------
  const renderTodaySummary = () => {
    const date = $('date').value;
    const box = $('todaySummary');
    if (!date) { box.classList.remove('show'); return; }

    const records = loadRecords()
      .filter(r => r.date === date)
      .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    if (records.length === 0) { box.classList.remove('show'); return; }

    $('todaySummaryHead').textContent = `本日の記録 (${formatDate(date)}) ・ タップで詳細`;
    const body = $('todaySummaryBody');
    body.innerHTML = records.map((r, idx) => {
      const valid = r.sets.filter(s => s.weight != null);
      const maxW = valid.length ? Math.max(...valid.map(s => s.weight)) : null;
      const setsCount = r.sets.length;
      const meta = [
        `${setsCount}セット`,
        maxW !== null ? `最大${maxW}kg` : null,
        r.gym
      ].filter(Boolean).join(' / ');
      const part = EXERCISE_TO_GROUP[r.exercise] || '';
      const partBadge = part ? `<span class="part-badge" data-part="${escapeHtml(part)}">${escapeHtml(part)}</span>` : '';

      // 詳細(展開時表示)
      const setLines = r.sets.map(s => {
        const parts = [];
        if (s.weight !== null && s.weight !== undefined) parts.push(`${s.weight}kg`);
        if (s.reps !== null && s.reps !== undefined) parts.push(`${s.reps}回`);
        return `<div class="set-line">セット ${s.no}: ${parts.join(' × ') || '(未入力)'}</div>`;
      }).join('');
      const memoLine = r.memo ? `<div class="memo-line">メモ: ${escapeHtml(r.memo)}</div>` : '';

      const isFirst = idx === 0;
      const isLast = idx === records.length - 1;
      return `
        <div class="row-item" data-id="${r.id}">
          <div class="row-header">
            <div style="min-width:0;flex:1;">
              <div style="font-weight:700;">
                <span style="color:#6ee7b7;margin-right:6px;">${idx + 1}.</span>${partBadge}${escapeHtml(r.exercise)}
              </div>
              <div class="row-meta">${meta}</div>
            </div>
            <div class="count">${setsCount}</div>
            <div class="expand-arrow">▾</div>
          </div>
          <div class="row-details">
            ${setLines}
            ${memoLine}
            <div class="reorder-row">
              <button class="reorder-btn" data-move-up="${r.id}" type="button" ${isFirst ? 'disabled' : ''}>↑ 上へ</button>
              <button class="reorder-btn" data-move-down="${r.id}" type="button" ${isLast ? 'disabled' : ''}>↓ 下へ</button>
            </div>
            <button class="edit-btn" data-edit-id="${r.id}" type="button">この記録を修正</button>
          </div>
        </div>
      `;
    }).join('');

    // 行クリックで展開/折りたたみ
    body.querySelectorAll('.row-item').forEach(row => {
      row.querySelector('.row-header').addEventListener('click', () => {
        row.classList.toggle('expanded');
      });
    });
    // 修正ボタン
    body.querySelectorAll('[data-edit-id]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        startEdit(btn.getAttribute('data-edit-id'));
      });
    });
    // 上下移動ボタン
    body.querySelectorAll('[data-move-up]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        moveRecord(btn.getAttribute('data-move-up'), -1);
      });
    });
    body.querySelectorAll('[data-move-down]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        moveRecord(btn.getAttribute('data-move-down'), 1);
      });
    });
    box.classList.add('show');
  };

  // ---------- 修正モード開始 ----------
  const startEdit = (id) => {
    const records = loadRecords();
    const r = records.find(x => x.id === id);
    if (!r) { showToast('記録が見つかりませんでした', 'ng'); return; }

    editingRecordId = id;

    // 日付
    $('date').value = r.date;

    // ジム: 既知の選択肢にあるか確認
    const customGyms = loadCustomGyms();
    const knownGyms = [...DEFAULT_GYMS, ...customGyms];
    buildGymOptions();
    if (knownGyms.includes(r.gym)) {
      $('gym').value = r.gym;
      $('otherGymWrap').classList.remove('show');
      $('otherGym').value = '';
    } else {
      // 未知のジム名 → その他に入れる
      $('gym').value = '__other__';
      $('otherGym').value = r.gym;
      $('otherGymWrap').classList.add('show');
    }

    // 種目: カスタム種目がある可能性も踏まえて選択肢を再構築
    applyCustomExercises();
    buildExerciseOptions();
    $('exercise').value = r.exercise;

    // セット
    setList.innerHTML = '';
    if (r.sets.length === 0) {
      addSet(); addSet(); addSet();
    } else {
      r.sets.forEach((s, i) => {
        const w = (s.weight != null) ? s.weight : '';
        const reps = (s.reps != null) ? s.reps : '';
        setList.appendChild(buildSetRow(i + 1, w, reps, r.exercise));
      });
    }

    // メモ
    $('memo').value = r.memo || '';

    // 前回情報を表示
    showPrevInfo(r.exercise);

    // バナー表示
    $('editModeBannerText').textContent = `${formatDate(r.date)} @ ${r.gym} ・ ${r.exercise}`;
    updateEditModeUI();

    // 画面トップへ
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showToast('修正モードに切り替えました');
  };

  // ---------- 修正キャンセル ----------
  const cancelEdit = () => {
    editingRecordId = null;
    updateEditModeUI();
    // フォームをリセット
    $('exercise').value = '';
    $('prevInfo').classList.remove('show');
    $('memo').value = '';
    setList.innerHTML = '';
    addSet(); addSet(); addSet();
    showToast('修正をキャンセルしました');
  };
  $('cancelEditBtn').addEventListener('click', cancelEdit);

  $('date').addEventListener('change', renderTodaySummary);
  $('gym').addEventListener('change', renderTodaySummary);

  // ---------- セット入力 ----------
  const setList = $('setList');

  // 指定行より後の全セットに同じ重量を反映(連鎖入力)
  const cascadeFromRow = (row, value) => {
    const rows = [...setList.querySelectorAll('.set-item')];
    const idx = rows.indexOf(row);
    if (idx < 0) return;
    for (let i = idx + 1; i < rows.length; i++) {
      const w = rows[i].querySelector('input[data-role="weight"]');
      if (w) w.value = value;
    }
  };

  const buildSetRow = (no, weight = '', reps = '', exercise = '') => {
    const div = document.createElement('div');
    div.className = 'set-item';
    const big = isBigMuscle(exercise);

    let weightHtml;
    if (big) {
      const val = (weight === '' || weight == null) ? '' : weight;
      weightHtml = `
        <div class="gauge">
          <button class="gauge-btn" data-action="dec" type="button">−5</button>
          <div class="gauge-input-wrap">
            <input type="number" class="gauge-input" inputmode="decimal" step="0.5" placeholder="—" value="${val}" data-role="weight">
            <span class="gauge-unit">kg</span>
          </div>
          <button class="gauge-btn" data-action="inc" type="button">+5</button>
        </div>
      `;
    } else {
      weightHtml = `
        <div class="weight-wrap">
          <input type="number" inputmode="decimal" step="0.5" placeholder="重量" value="${weight}" data-role="weight">
          <span class="unit-label">kg</span>
        </div>
      `;
    }

    div.innerHTML = `
      <div class="set-item-top">
        <div class="set-no">セット ${no}</div>
        <button class="icon-btn" type="button" aria-label="削除">削除</button>
      </div>
      <div class="set-item-inputs">
        ${weightHtml}
        <div class="reps-wrap">
          <input type="number" inputmode="numeric" step="1" placeholder="回数" value="${reps}" data-role="reps">
          <span class="unit-label">回</span>
        </div>
      </div>
    `;

    if (big) {
      const weightInput = div.querySelector('.gauge-input');
      const inc = div.querySelector('[data-action="inc"]');
      const dec = div.querySelector('[data-action="dec"]');

      inc.addEventListener('click', () => {
        const cur = weightInput.value === '' ? 0 : Number(weightInput.value);
        weightInput.value = (cur + 5);
        weightInput.dispatchEvent(new Event('input', { bubbles: true }));
      });
      dec.addEventListener('click', () => {
        const cur = weightInput.value === '' ? 0 : Number(weightInput.value);
        weightInput.value = Math.max(0, cur - 5);
        weightInput.dispatchEvent(new Event('input', { bubbles: true }));
      });
      // フォーカス時に全選択(タップして上書き入力しやすく)
      weightInput.addEventListener('focus', () => {
        setTimeout(() => weightInput.select(), 0);

    // 重量変更時に以降のセットへ連鎖反映

      renumberSets();

  // 種目の前回最終セット重量(大筋群用の初期値計算)
  const getPrevLastWeight = (exercise) => {
    if (!exercise) return '';
    const records = loadRecords()
      .filter(r => r.exercise === exercise)
      .sort((a, b) => (a.date < b.date ? 1 : -1));
    if (records.length === 0) return '';
    const valid = records[0].sets.filter(s => s.weight != null);
    if (valid.length === 0) return '';
    const last = valid[valid.length - 1].weight;
    // 5kg刻みに丸める
    return Math.round(last / 5) * 5;
  };

  const renumberSets = () => {
    [...setList.querySelectorAll('.set-item')].forEach((row, idx) => {
      row.querySelector('.set-no').textContent = `セット ${idx + 1}`;

  const addSet = () => {

  $('addSetBtn').addEventListener('click', addSet);

  const resetForm = () => {

    addSet();
    addSet();

  $('clearBtn').addEventListener('click', () => {

  // ---------- 保存 ----------
  $('saveBtn').addEventListener('click', () => {
    const date = $('date').value;
    if (!date) { showToast('日付を選択してください', 'ng'); return; }

    let gym = $('gym').value;
    if (gym === '__other__') {
      const other = $('otherGym').value.trim();
      if (!other) { showToast('店舗名を入力してください', 'ng'); return; }
      gym = other;
      // カスタム店舗を保存して次回以降の候補に追加
      const customGyms = loadCustomGyms();
      if (!DEFAULT_GYMS.includes(gym) && !customGyms.includes(gym)) {
        customGyms.push(gym);
        saveCustomGyms(customGyms);
      }
    }

    const exercise = $('exercise').value;
    if (!exercise) { showToast('種目を選択してください', 'ng'); return; }

    const sets = [...setList.querySelectorAll('.set-item')].map((row, idx) => {
      const wInput = row.querySelector('input[data-role="weight"]');
      const rInput = row.querySelector('input[data-role="reps"]');
      const weight = (wInput && wInput.value !== '') ? Number(wInput.value) : null;
      const reps = (rInput && rInput.value !== '') ? Number(rInput.value) : null;
      return { no: idx + 1, weight, reps };
    }).filter(s => s.weight !== null || s.reps !== null);

    if (sets.length === 0) {
      showToast('セットを1つ以上入力してください', 'ng'); return;
    }

    const records = loadRecords();
    let savedExercise = exercise;
    if (editingRecordId) {
      // 既存レコードを更新
      const idx = records.findIndex(r => r.id === editingRecordId);
      if (idx >= 0) {
        records[idx] = {
          ...records[idx],
          date, gym, exercise, sets,
          memo: $('memo').value.trim(),
          updatedAt: new Date().toISOString()
        };
        saveRecords(records);
        showToast(`「${exercise}」を修正しました`);
      } else {
        showToast('修正対象が見つからなかったため、新規として保存します', 'ng');
        records.push({
          id: uid(), date, gym, exercise, sets,
          memo: $('memo').value.trim(),
          createdAt: new Date().toISOString()
        });
        saveRecords(records);
      }
      editingRecordId = null;
      updateEditModeUI();
    } else {
      // 新規追加: 同じ日の order の最大値+1 を付与
      const maxOrder = records
        .filter(r => r.date === date)
        .reduce((m, r) => Math.max(m, r.order ?? -1), -1);
      records.push({
        id: uid(), date, gym, exercise, sets,
        memo: $('memo').value.trim(),
        createdAt: new Date().toISOString(),
        order: maxOrder + 1
      });
      saveRecords(records);
      showToast(`「${exercise}」を保存しました`);

    $('exercise').value = '';
    $('prevInfo').classList.remove('show');
    $('memo').value = '';
    setList.innerHTML = '';
    addSet(); addSet(); addSet();

    // 本日の記録サマリーを更新
    renderTodaySummary();

    // 画面トップにスクロールしてサマリーを見せる
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // サマリーをフラッシュ表示で「追加されたよ」を視覚的に
    const ts = $('todaySummary');
    ts.classList.remove('flash');
    void ts.offsetWidth; // reflow
    ts.classList.add('flash');

  // ---------- 履歴 ----------
  const renderHistory = () => {
    const records = loadRecords().sort((a, b) => (a.date < b.date ? 1 : -1));

    const gyms = [...new Set(records.map(r => r.gym))];
    const exercisesUsed = [...new Set(records.map(r => r.exercise))];
    const fg = $('filterGym');
    const fp = $('filterPart');
    const fe = $('filterExercise');
    const prevG = fg.value;
    const prevP = fp.value;
    const prevE = fe.value;

    fg.innerHTML = '<option value="">すべて</option>' + gyms.map(g => `<option value="${escapeHtml(g)}">${escapeHtml(g)}</option>`).join('');
    // 部位フィルタは全6部位を固定で表示
    fp.innerHTML = '<option value="">すべて</option>' + EXERCISE_GROUPS.map(g => `<option value="${escapeHtml(g.name)}">${escapeHtml(g.name)}</option>`).join('');

    // 種目フィルタは選択中の部位に応じて絞り込む
    fg.value = prevG;
    fp.value = prevP;
    const partVal = fp.value;
    const exercisesForFilter = partVal
      ? exercisesUsed.filter(e => EXERCISE_TO_GROUP[e] === partVal)
      : exercisesUsed;
    fe.innerHTML = '<option value="">すべて</option>' + exercisesForFilter.map(e => `<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join('');
    fe.value = exercisesForFilter.includes(prevE) ? prevE : '';

    const fgVal = fg.value, feVal = fe.value;
    const filtered = records.filter(r =>
      (!fgVal || r.gym === fgVal) &&
      (!partVal || EXERCISE_TO_GROUP[r.exercise] === partVal) &&
      (!feVal || r.exercise === feVal)
    );

    $('summary').textContent = `表示中: ${filtered.length}件 / 全${records.length}件`;

    const list = $('historyList');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="history-empty">記録がありません</div>';
      return;
    }

    list.innerHTML = filtered.map(r => {
      const setsText = r.sets.map(s => {
        const parts = [];
        if (s.weight !== null && s.weight !== undefined) parts.push(`${s.weight}kg`);
        if (s.reps !== null && s.reps !== undefined) parts.push(`${s.reps}回`);
        return `${s.no}セット目: ${parts.join(' × ')}`;
      }).join('<br>');

      const valid = r.sets.filter(s => s.weight && s.reps);
      const maxW = valid.length ? Math.max(...valid.map(s => s.weight)) : null;
      const vol = valid.reduce((a, s) => a + (s.weight * s.reps), 0);
      const stat = (maxW !== null)
        ? `<div style="color:#38bdf8;font-size:13px;margin-top:6px;">最大: ${maxW}kg / 総ボリューム: ${vol}kg</div>`
        : '';

      const part = EXERCISE_TO_GROUP[r.exercise] || '';
      const partBadge = part ? `<span class="part-badge" data-part="${escapeHtml(part)}">${escapeHtml(part)}</span>` : '';

      return `
        <div class="history-item" data-id="${r.id}">
          <div class="history-head">
            <div class="history-date">${formatDate(r.date)}</div>
            <div class="history-gym">${escapeHtml(r.gym)}</div>
          </div>
          <div class="history-exercise">${partBadge}<strong>${escapeHtml(r.exercise)}</strong></div>
          <div class="history-sets">${setsText}</div>
          ${stat}
          ${r.memo ? `<div class="history-memo">${escapeHtml(r.memo)}</div>` : ''}
          <div style="display:flex;gap:14px;align-items:center;">
            <a class="delete-link" data-del="${r.id}">削除</a>
            <a class="delete-link" data-edit-history="${r.id}" style="color:#f59e0b;">修正</a>
          </div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('[data-del]').forEach(a => {
      a.addEventListener('click', () => {
        if (!confirm('この記録を削除しますか?')) return;
        const id = a.getAttribute('data-del');
        const next = loadRecords().filter(r => r.id !== id);
        saveRecords(next);
        renderHistory();
        showToast('削除しました');
      });
    });
    // 履歴からの修正: 入力タブに切り替えてから編集モードに入る
    list.querySelectorAll('[data-edit-history]').forEach(a => {
      a.addEventListener('click', () => {
        const id = a.getAttribute('data-edit-history');
        // 入力タブに切り替え
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelector('.tab[data-tab="input"]').classList.add('active');
        $('panel-input').classList.add('active');
        startEdit(id);
      });
    });
  };

  $('filterGym').addEventListener('change', renderHistory);
  $('filterPart').addEventListener('change', renderHistory);
  $('filterExercise').addEventListener('change', renderHistory);

  $('deleteAllBtn').addEventListener('click', () => {
    if (!confirm('全ての記録を削除します。よろしいですか?')) return;
    if (!confirm('本当に削除しますか?この操作は取り消せません。')) return;
    saveRecords([]);
    renderHistory();
    showToast('全件削除しました');
  });

  // ---------- CSV出力 ----------
  $('exportBtn').addEventListener('click', () => {
    const records = loadRecords();
    if (records.length === 0) { showToast('記録がありません', 'ng'); return; }
    const header = ['日付', 'ジム', '部位', '種目', 'セット番号', '重量kg', '回数', 'メモ'];
    const rows = [header];
    records.forEach(r => {
      const part = EXERCISE_TO_GROUP[r.exercise] || '';
      r.sets.forEach(s => {
        rows.push([
          r.date, r.gym, part, r.exercise, s.no,
          s.weight ?? '', s.reps ?? '', r.memo || ''
        ]);
      });
    });
    const csv = rows.map(row =>
      row.map(v => {
        const s = String(v ?? '');
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }).join(',')
    ).join('\n');
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `workout_${todayISO()}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // ---------- 成長タブ ----------
  const METRIC_LABELS = {
    avg: '平均重量 (kg)',
    max: '最大重量 (kg)',
    volume: '総ボリューム (kg)',
    '1rm': '推定1RM (kg)',
    sets: 'セット数'
  };
  const METRIC_HINTS = {
    avg: '各セットの「重量×回数」の合計を「総回数」で割った値。レップ数が日によって違っても、その日にどのくらいの強度で挙げられたかを表します。トレンドが右肩上がりなら筋力が伸びている指標。前後と比べて急に落ちている日は疲労が出ている可能性があります。',
    max: 'その日に挙げた最大重量(セット最高値)。挑戦的なセットを行えた日は上がります。最大重量の更新ペースで成長度合いを測れます。',
    volume: '総ボリューム = Σ(重量×回数)。その日のトータルな仕事量。回数を増やしても上がるので、追い込みの量を見るのに向いています。',
    '1rm': 'Epley式: 重量 × (1 + 回数 / 30) の最大値。各セットから理論上の1回挙上重量を推定。レップ数のばらつきを吸収して純粋な筋力推移を見やすい指標です。',
    sets: 'その日に行ったセット数。種目への注力度合いの推移。'
  };

  const computeMetric = (record, type) => {
    const sets = record.sets.filter(s => s.weight != null);
    const setsWithReps = sets.filter(s => s.reps != null);
    if (type === 'avg') {
      const totalReps = setsWithReps.reduce((a, s) => a + s.reps, 0);
      if (totalReps === 0) return null;
      const totalVol = setsWithReps.reduce((a, s) => a + s.weight * s.reps, 0);
      return totalVol / totalReps;
    }
    if (type === 'max') {
      if (sets.length === 0) return null;
      return Math.max(...sets.map(s => s.weight));
    }
    if (type === 'volume') {
      if (setsWithReps.length === 0) return null;
      return setsWithReps.reduce((a, s) => a + s.weight * s.reps, 0);
    }
    if (type === '1rm') {
      if (setsWithReps.length === 0) return null;
      return Math.max(...setsWithReps.map(s => s.weight * (1 + s.reps / 30)));
    }
    if (type === 'sets') {
      return record.sets.length;
    }
    return null;
  };

  // 現在の表示モード(chart / list)
  let growthView = 'chart';

  // 期間プリセット
  const applyPreset = (preset) => {
    const today = new Date();
    const toISO = (d) => {
      const tz = d.getTimezoneOffset() * 60000;
      return new Date(d - tz).toISOString().slice(0, 10);
    };
    if (preset === 'all') {
      $('growthFrom').value = '';
      $('growthTo').value = '';
    } else {
      const days = preset === '2w' ? 14 : preset === '1m' ? 30 : preset === '3m' ? 90 : 30;
      const from = new Date(today.getTime() - days * 86400000);
      $('growthFrom').value = toISO(from);
      $('growthTo').value = toISO(today);
    }
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.preset === preset);
    });
    drawGrowth();
  };

  const renderGrowth = () => {
    const records = loadRecords();
    const exercisesUsed = [...new Set(records.map(r => r.exercise))];
    const sel = $('growthExercise');
    const prev = sel.value;

    if (exercisesUsed.length === 0) {
      sel.innerHTML = '<option value="">記録がありません</option>';
    } else {
      let html = '<option value="">-- 選択してください --</option>';
      EXERCISE_GROUPS.forEach(g => {
        const items = g.items.filter(it => exercisesUsed.includes(it));
        if (items.length === 0) return;
        html += `<optgroup label="${escapeHtml(g.name)}">`;
        items.forEach(it => {
          html += `<option value="${escapeHtml(it)}">${escapeHtml(it)}</option>`;
        });
        html += '</optgroup>';
      });
      // カスタム種目(将来用)
      const custom = exercisesUsed.filter(e => !EXERCISE_TO_GROUP[e]);
      if (custom.length > 0) {
        html += `<optgroup label="その他">`;
        custom.forEach(it => {
          html += `<option value="${escapeHtml(it)}">${escapeHtml(it)}</option>`;
        });
        html += '</optgroup>';
      }
      sel.innerHTML = html;
    }
    if (prev && exercisesUsed.includes(prev)) sel.value = prev;

    updateMetricHint();
    drawGrowth();
  };

  // 統合エントリーポイント: モードに応じてグラフ or リストを描画
  const drawGrowth = () => {
    if (growthView === 'chart') drawChart();
    else drawListView();
  };

  // 日付範囲フィルタ
  const filterByDateRange = (records) => {
    const from = $('growthFrom').value;
    const to = $('growthTo').value;
    return records.filter(r => {
      if (from && r.date < from) return false;
      if (to && r.date > to) return false;
      return true;
    });
  };

  // リスト表示
  const drawListView = () => {
    const exercise = $('growthExercise').value;
    const metric = $('growthMetric').value;
    const container = $('chartContainer');

    if (!exercise) {
      container.innerHTML = '<div class="chart-empty">種目を選択するとリストが表示されます</div>';
      return;
    }

    const allRecords = loadRecords()
      .filter(r => r.exercise === exercise)
      .sort((a, b) => (a.date < b.date ? 1 : -1));
    const records = filterByDateRange(allRecords);

    if (records.length === 0) {
      container.innerHTML = '<div class="chart-empty">この期間に記録がありません</div>';
      return;
    }

    // 店舗ごとにグループ化
    const byGym = {};
    records.forEach(r => {
      if (!byGym[r.gym]) byGym[r.gym] = [];
      byGym[r.gym].push(r);
    });

    // 各店舗の表示
    const gymsHtml = Object.entries(byGym).map(([gym, recs]) => {
      const recordsHtml = recs.map(r => {
        const m = computeMetric(r, metric);
        const setsText = r.sets.map(s => {
          const parts = [];
          if (s.weight !== null && s.weight !== undefined) parts.push(`${s.weight}kg`);
          if (s.reps !== null && s.reps !== undefined) parts.push(`${s.reps}回`);
          return parts.join('×');
        }).join(' / ');
        return `
          <div class="growth-list-record">
            <div class="growth-list-record-head">
              <span class="growth-list-date">${formatDate(r.date)}</span>
              <span class="growth-list-metric">${m !== null ? formatNum(m) : '-'}</span>
            </div>
            <div class="growth-list-sets">${setsText || '(セット記録なし)'}</div>
            ${r.memo ? `<div class="growth-list-memo">${escapeHtml(r.memo)}</div>` : ''}
          </div>
        `;
      }).join('');
      return `
        <div class="growth-list-gym-head">
          <span>${escapeHtml(gym)}</span>
          <span class="growth-list-gym-count">${recs.length}回</span>
        </div>
        <div class="growth-list-records">${recordsHtml}</div>
      `;
    }).join('');

    // 期間ヘッダー
    const from = $('growthFrom').value;
    const to = $('growthTo').value;
    const periodLabel = (from || to)
      ? `${from || '記録開始'} 〜 ${to || '今日'}`
      : '全期間';

    container.innerHTML = `
      <div class="chart-title">${escapeHtml(exercise)} ・ ${METRIC_LABELS[metric]}</div>
      <div style="text-align:center;color:#94a3b8;font-size:12px;margin-bottom:14px;">${periodLabel} ・ 全${records.length}件 ・ ${Object.keys(byGym).length}店舗</div>
      <div class="growth-list-section">
        ${gymsHtml}
      </div>
    `;
  };

  const updateMetricHint = () => {
    const metric = $('growthMetric').value;
    $('metricHint').textContent = METRIC_HINTS[metric] || '';
  };

  const drawChart = () => {
    const exercise = $('growthExercise').value;
    const metric = $('growthMetric').value;
    const container = $('chartContainer');

    if (!exercise) {
      container.innerHTML = '<div class="chart-empty">種目を選択するとグラフが表示されます</div>';
      return;
    }

    const allRecords = loadRecords()
      .filter(r => r.exercise === exercise)
      .sort((a, b) => (a.date < b.date ? -1 : 1));
    const records = filterByDateRange(allRecords);

    if (allRecords.length === 0) {
      container.innerHTML = '<div class="chart-empty">この種目の記録がありません</div>';
      return;
    }
    if (records.length === 0) {
      container.innerHTML = '<div class="chart-empty">この期間に記録がありません(期間を変えてみてください)</div>';
      return;
    }

    const points = records.map(r => ({
      date: r.date,
      value: computeMetric(r, metric),
      gym: r.gym,
      record: r
    })).filter(p => p.value != null);

    if (points.length === 0) {
      container.innerHTML = '<div class="chart-empty">指標を計算できるデータがありません(重量・回数の記録が必要)</div>';
      return;
    }

    // SVG レイアウト
    const W = 600, H = 320;
    const padL = 46, padR = 16, padT = 30, padB = 46;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    const values = points.map(p => p.value);
    const minVal = Math.min(...values);
    const maxVal = Math.max(...values);
    const range = (maxVal - minVal) || Math.max(1, Math.abs(maxVal) * 0.1);
    const yMin = Math.max(0, minVal - range * 0.15);
    const yMax = maxVal + range * 0.15;

    const xOf = (i) => padL + (points.length === 1 ? chartW / 2 : (i / (points.length - 1)) * chartW);
    const yOf = (v) => padT + chartH - ((v - yMin) / (yMax - yMin || 1)) * chartH;

    // Y軸目盛り
    const yTicks = 5;
    let gridHtml = '';
    let yLabelsHtml = '';
    for (let i = 0; i <= yTicks; i++) {
      const y = padT + (i / yTicks) * chartH;
      const v = yMax - (i / yTicks) * (yMax - yMin);
      gridHtml += `<line x1="${padL}" y1="${y}" x2="${padL + chartW}" y2="${y}" stroke="#334155" stroke-dasharray="2,3"/>`;
      yLabelsHtml += `<text x="${padL - 6}" y="${y + 4}" fill="#94a3b8" font-size="11" text-anchor="end">${formatNum(v)}</text>`;
    }

    // ライン
    const linePts = points.map((p, i) => `${xOf(i)},${yOf(p.value)}`).join(' ');
    const lineEl = `<polyline points="${linePts}" fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

    // 移動平均(直近3点)を計算して、その下にあるポイントを「疲労気味」と判定
    const sma = points.map((_, i) => {
      const start = Math.max(0, i - 2);
      const window = points.slice(start, i + 1);
      return window.reduce((a, p) => a + p.value, 0) / window.length;
    });

    // ドット(疲労判定で色変更)
    const dotsHtml = points.map((p, i) => {
      const x = xOf(i), y = yOf(p.value);
      let stroke = '#38bdf8';
      let fill = '#0f172a';
      if (i >= 2 && p.value < sma[i - 1] * 0.95) { stroke = '#f87171'; }   // 直前移動平均より5%以上低い → 疲労気味
      else if (i >= 2 && p.value > sma[i - 1] * 1.05) { stroke = '#22c55e'; fill = '#052e1f'; } // 5%以上高い → 好調
      return `<circle cx="${x}" cy="${y}" r="5" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
    }).join('');

    // X軸ラベル(等間隔に最大6個程度)
    let xLabelsHtml = '';
    const desired = Math.min(points.length, 6);
    const stepX = Math.max(1, Math.round((points.length - 1) / Math.max(1, desired - 1)));
    const xLabelSet = new Set();
    for (let i = 0; i < points.length; i += stepX) xLabelSet.add(i);
    xLabelSet.add(points.length - 1);
    [...xLabelSet].forEach(i => {
      const x = xOf(i);
      const d = points[i].date;
      const label = d.slice(5).replace('-', '/');
      xLabelsHtml += `<text x="${x}" y="${padT + chartH + 18}" fill="#94a3b8" font-size="11" text-anchor="middle">${label}</text>`;
    });

    // 値ラベル(初・末・最大・最小に表示)
    const idxMax = values.reduce((mi, v, i) => v > values[mi] ? i : mi, 0);
    const idxMin = values.reduce((mi, v, i) => v < values[mi] ? i : mi, 0);
    const labelIdx = new Set([0, points.length - 1, idxMax, idxMin]);
    let valueLabelsHtml = '';
    labelIdx.forEach(i => {
      const p = points[i];
      const x = xOf(i), y = yOf(p.value);
      valueLabelsHtml += `<text x="${x}" y="${y - 10}" fill="#f1f5f9" font-size="11" font-weight="700" text-anchor="middle">${formatNum(p.value)}</text>`;
    });

    const svg = `<div class="chart-svg-wrap"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;">
      ${gridHtml}
      <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + chartH}" stroke="#475569"/>
      <line x1="${padL}" y1="${padT + chartH}" x2="${padL + chartW}" y2="${padT + chartH}" stroke="#475569"/>
      ${yLabelsHtml}
      ${xLabelsHtml}
      ${lineEl}
      ${dotsHtml}
      ${valueLabelsHtml}
    </svg></div>`;

    // 統計
    const first = values[0];
    const last = values[values.length - 1];
    const delta = last - first;
    const deltaPct = first !== 0 ? (delta / first * 100) : 0;
    const arrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';
    const trendColor = delta > 0 ? '#22c55e' : delta < 0 ? '#ef4444' : '#94a3b8';

    // データテーブル(新しい順)
    const tableRows = [...points].map((p, i) => {
      const idx = i;
      const reverseIdx = points.length - 1 - idx;
      let cls = '';
      if (reverseIdx >= 2) {
        if (p.value < sma[reverseIdx - 1] * 0.95) cls = 'fatigue-low';
        else if (p.value > sma[reverseIdx - 1] * 1.05) cls = 'fatigue-up';
      }
      return { p, cls, idx: reverseIdx };
    });
    const tableHtml = `
      <div class="chart-table">
        <div class="chart-table-row chart-table-head">
          <div>日付</div><div>ジム</div><div class="val">値</div>
        </div>
        ${[...tableRows].reverse().map(({p, cls}) => `
          <div class="chart-table-row">
            <div>${formatDate(p.date)}</div>
            <div>${escapeHtml(p.gym)}</div>
            <div class="val ${cls}">${formatNum(p.value)}</div>
          </div>
        `).join('')}
      </div>
    `;

    container.innerHTML = `
      <div class="chart-title">${escapeHtml(exercise)} ・ ${METRIC_LABELS[metric]}</div>
      <div class="chart-stats">
        <div>
          <div class="stat-label">最新</div>
          <div class="stat-value">${formatNum(last)}</div>
        </div>
        <div>
          <div class="stat-label">初回からの変化</div>
          <div class="stat-value" style="color:${trendColor};font-size:14px;">${arrow} ${formatNum(Math.abs(delta))} (${deltaPct >= 0 ? '+' : ''}${deltaPct.toFixed(1)}%)</div>
        </div>
        <div>
          <div class="stat-label">最大値</div>
          <div class="stat-value">${formatNum(maxVal)}</div>
        </div>
        <div>
          <div class="stat-label">記録回数</div>
          <div class="stat-value">${points.length}回</div>
        </div>
      </div>
      ${svg}
      <div style="font-size:11px;color:#94a3b8;margin-top:8px;text-align:center;">
        <span style="color:#22c55e;">●</span> 直前平均+5%超(好調)
        <span style="color:#f87171;">●</span> 直前平均-5%超(疲労気味)
      </div>
      ${tableHtml}
    `;
  };

  $('growthExercise').addEventListener('change', drawGrowth);
  $('growthMetric').addEventListener('change', () => { updateMetricHint(); drawGrowth(); });
  $('growthFrom').addEventListener('change', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    drawGrowth();
  });
  $('growthTo').addEventListener('change', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    drawGrowth();
  });
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      growthView = tab.dataset.view;
      drawGrowth();
    });
  });
  // 初期状態: 「全期間」をアクティブに
  document.querySelector('.preset-btn[data-preset="all"]').classList.add('active');

  // ---------- ヘルパー ----------
  function formatNum(n) {
    if (n === null || n === undefined || isNaN(n)) return '-';
    if (Math.abs(n) >= 1000) return n.toFixed(0);
    if (Math.abs(n) >= 100) return n.toFixed(1);
    return n.toFixed(2).replace(/\.?0+$/, '');
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
    );
  }
  function formatDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    const wd = ['日','月','火','水','木','金','土'][d.getDay()];
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${wd})`;
  }

  // ---------- 初期化 ----------
  ensureRecordOrder();
  resetForm();
  renderTodaySummary();
</script>
</body>
</html>
